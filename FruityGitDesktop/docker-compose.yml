# Minimal stack: Postgres + single backend (auth + git API).
# Optional: add Loki/Prometheus/Grafana for observability.

services:
  postgres:
    container_name: postgres_container
    image: postgres:14.8-alpine3.18
    environment:
      POSTGRES_DB: "FruityDB"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123Secret"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - fruity-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FruityDB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  fruitygitserver:
    container_name: fruity-server
    build:
      context: .
      dockerfile: src/FruityGitServer/Dockerfile
    ports:
      - "8081:8080"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - APP_NAME=fruitygit
      - DB_HOST=postgres
      - POSTGRES_DB=FruityDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123Secret
    volumes:
      - ./ReposFolder:/app/ReposFolder

volumes:
  fruity-data:

networks:
  backend:
    driver: bridge
